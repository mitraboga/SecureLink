services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: securelink
      POSTGRES_USER: securelink
      POSTGRES_PASSWORD: securelink
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securelink -d securelink"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - .env.example
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8010:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5

  reverse-proxy:
    image: caddy:2.8-alpine
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./reverse_proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "8443:8443"

  dashboard:
    build: .
    env_file:
      - .env.example
    environment:
      SECURELINK_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    command: ["streamlit", "run", "dashboard/streamlit_app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
    ports:
      - "8501:8501"

  prometheus:
    image: prom/prometheus:v2.55.1
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: securelink
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3010:3000"

volumes:
  postgres_data:
  grafana_data:
  redis_data:
  caddy_data:
  caddy_config:
