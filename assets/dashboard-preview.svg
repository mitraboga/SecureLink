<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">SecureLink Dashboard Preview</title>
  <desc id="desc">Preview of the SecureLink Streamlit dashboard with metrics and event table.</desc>
  <rect width="1200" height="680" fill="#f7f9fb"/>
  <rect x="40" y="40" width="1120" height="600" rx="10" fill="#ffffff" stroke="#d5dce3"/>
  <text x="80" y="95" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#17202a">SecureLink Security Dashboard</text>

  <g font-family="Arial, sans-serif">
    <rect x="80" y="145" width="300" height="115" rx="8" fill="#eaf1ff" stroke="#2f6fed"/>
    <text x="105" y="185" font-size="15" fill="#53616f">Total Events</text>
    <text x="105" y="235" font-size="42" font-weight="700" fill="#17202a">8</text>

    <rect x="450" y="145" width="300" height="115" rx="8" fill="#fdecec" stroke="#d64545"/>
    <text x="475" y="185" font-size="15" fill="#53616f">High Severity</text>
    <text x="475" y="235" font-size="42" font-weight="700" fill="#17202a">3</text>

    <rect x="820" y="145" width="300" height="115" rx="8" fill="#fff6e6" stroke="#d99000"/>
    <text x="845" y="185" font-size="15" fill="#53616f">Replay Attempts</text>
    <text x="845" y="235" font-size="42" font-weight="700" fill="#17202a">1</text>

    <rect x="80" y="315" width="1040" height="265" rx="8" fill="#fbfcfd" stroke="#d5dce3"/>
    <text x="105" y="360" font-size="18" font-weight="700" fill="#17202a">Recent Security Events</text>
    <line x1="105" y1="385" x2="1095" y2="385" stroke="#d5dce3"/>
    <text x="105" y="425" font-size="15" font-weight="700" fill="#53616f">Type</text>
    <text x="405" y="425" font-size="15" font-weight="700" fill="#53616f">Severity</text>
    <text x="610" y="425" font-size="15" font-weight="700" fill="#53616f">Description</text>
    <text x="105" y="470" font-size="15" fill="#17202a">REPLAY_ATTACK_DETECTED</text>
    <text x="405" y="470" font-size="15" fill="#d64545">HIGH</text>
    <text x="610" y="470" font-size="15" fill="#17202a">Rejected duplicate message id or nonce</text>
    <text x="105" y="515" font-size="15" fill="#17202a">HMAC_VERIFICATION_FAILED</text>
    <text x="405" y="515" font-size="15" fill="#d64545">HIGH</text>
    <text x="610" y="515" font-size="15" fill="#17202a">HMAC failed for tampered message</text>
  </g>
</svg>
